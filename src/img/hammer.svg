<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Рукоятка -->
  <rect x="13" y="12" width="6" height="18" rx="2" fill="#C19A6B"/>
  <rect x="14" y="12" width="4" height="18" fill="#A0784C"/>
  
  <!-- Металлическая часть -->
  <rect x="4" y="4" width="24" height="10" rx="2" fill="#888888"/>
  <rect x="4" y="4" width="24" height="4" rx="2" fill="#AAAAAA"/>
  
  <!-- Блик на металле -->
  <rect x="6" y="5" width="8" height="2" rx="1" fill="#CCCCCC" opacity="0.6"/>
  
  <!-- Ободок молотка -->
